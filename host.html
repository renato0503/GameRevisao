<!-- host.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz BI - Professor (Host)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="data.js"></script>
    <script src="https://unpkg.com/trystero/dist/trystero.min.js"></script>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="container">
        <h1>Dashboard do Professor</h1>

        <!-- Step 1: Initialization -->
        <div id="setup-screen" class="glass-card text-center animate-in">
            <p class="text-secondary" id="status-text">Iniciando conexão P2P...</p>
            <div id="room-display" class="hidden">
                <p class="room-info">Sala Criada • Compartilhe o código</p>
                <div class="room-id" id="room-id-text">----</div>
                <div class="invite-card">
                    <div id="qrcode"></div>
                    <p class="text-secondary">Alunos conectados: <span id="player-count" style="color:var(--text); font-weight:800;">0</span></p>
                    <div class="player-list" id="player-list"></div>
                    <button class="btn btn-primary mt-4" id="start-game-btn" disabled style="width: 100%;">Aguardando Alunos...</button>
                </div>
            </div>
        </div>

        <!-- Step 2: Question Display -->
        <div id="game-screen" class="glass-card hidden animate-in">
            <div class="room-info">Questão <span id="current-q-num">1</span> de 50</div>
            <h2 id="question-text">Carregando pergunta...</h2>
            <div class="options-grid" id="options-display"></div>
            
            <div class="mt-4 text-center">
                <p id="responses-info" class="text-secondary">Respostas: 0 / 0</p>
                <button class="btn btn-primary mt-4" id="next-q-btn" style="width: 100%;">Mostrar Resposta</button>
            </div>
        </div>

        <!-- Step 3: Ranking -->
        <div id="ranking-screen" class="glass-card hidden animate-in">
            <h2 class="text-center">Liderança Parcial</h2>
            <div id="ranking-body"></div>
            <button class="btn btn-primary mt-4" id="continue-game-btn" style="width: 100%;">Próxima Pergunta</button>
        </div>

        <!-- Step 4: Final Podium -->
        <div id="podium-screen" class="glass-card hidden animate-in">
            <h1 class="text-center">Pódio Final 🏆</h1>
            <div id="podium-content" class="text-center"></div>
            <button class="btn btn-primary mt-4" onclick="location.reload()" style="width: 100%;">Reiniciar Quiz</button>
        </div>
    </div>

    <script>
        window.addEventListener('beforeunload', (event) => {
            event.preventDefault();
            event.returnValue = 'Atenção: Se você sair agora, a sala e o ranking serão perdidos permanentemente!';
        });

        const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        const roomConfig = { appId: 'quiz-bi-' + roomId };
        
        let getPeer, joinRoom, sendAction, onAction;
        
        let gameState = {
            currentQuestion: 0,
            players: {},
            isShowingResult: false,
            responsesCount: 0
        };

        async function initTrystero() {
            const result = Trystero.joinRoom(roomConfig);
            getPeer = result[0];
            joinRoom = result[1];
            sendAction = result[2];
            onAction = result[3];

            const peer = getPeer();
            
            document.getElementById('status-text').classList.add('hidden');
            document.getElementById('room-display').classList.remove('hidden');
            document.getElementById('room-id-text').innerText = roomId;
            
            const url = window.location.href.replace('host.html', 'index.html') + '?room=' + roomId;
            new QRCode(document.getElementById("qrcode"), {
                text: url,
                width: 200,
                height: 200
            });

            onAction((data, peerId) => {
                handleClientData(peerId, data);
            });
        }

        function handleClientData(peerId, data) {
            if (data.type === 'join') {
                gameState.players[peerId] = {
                    name: data.name,
                    score: 0,
                    answered: false
                };
                updatePlayerList();
                sendAction({ type: 'welcome', roomId: roomId }, peerId);
            }

            if (data.type === 'answer') {
                const player = gameState.players[peerId];
                if (player && !player.answered) {
                    player.answered = true;
                    gameState.responsesCount++;
                    
                    const question = quizData[gameState.currentQuestion];
                    if (data.answer === question.correct) {
                        player.score += 10;
                    }
                    
                    updateResponseCount();
                    sendAction({ type: 'answer_received' }, peerId);
                }
            }
        }

        function updatePlayerList() {
            const list = document.getElementById('player-list');
            const players = Object.values(gameState.players);
            list.innerHTML = players.map(p => `<span class="player-chip">${p.name}</span>`).join('');
            document.getElementById('player-count').innerText = players.length;
            
            const btn = document.getElementById('start-game-btn');
            if (players.length > 0) {
                btn.disabled = false;
                btn.innerText = 'Começar Quiz';
            }
        }

        function updateResponseCount() {
            const total = Object.keys(gameState.players).length;
            document.getElementById('responses-info').innerText = `Respostas: ${gameState.responsesCount} / ${total}`;
        }

        function broadcast(data) {
            sendAction(data);
        }

        document.getElementById('start-game-btn').onclick = () => {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            gameState.isShowingResult = false;
            gameState.responsesCount = 0;
            const q = quizData[gameState.currentQuestion];
            
            Object.values(gameState.players).forEach(p => p.answered = false);

            document.getElementById('current-q-num').innerText = gameState.currentQuestion + 1;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsHtml = Object.entries(q.options).map(([key, val]) => `
                <div class="option-btn" id="opt-${key}">
                    <span class="option-letter">${key})</span>
                    <span>${val}</span>
                </div>
            `).join('');
            
            document.getElementById('options-display').innerHTML = optionsHtml;
            document.getElementById('next-q-btn').innerText = 'Mostrar Resposta';
            updateResponseCount();

            broadcast({
                type: 'question',
                question: q.question,
                options: q.options,
                number: gameState.currentQuestion + 1
            });
        }

        document.getElementById('next-q-btn').onclick = () => {
            if (!gameState.isShowingResult) {
                gameState.isShowingResult = true;
                const correct = quizData[gameState.currentQuestion].correct;
                document.getElementById(`opt-${correct}`).classList.add('correct');
                document.getElementById('next-q-btn').innerText = 'Ver Ranking';
            } else {
                showRanking();
            }
        };

        function showRanking() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('ranking-screen').classList.remove('hidden');
            
            const sortedPlayers = Object.values(gameState.players)
                .sort((a, b) => b.score - a.score);
            
            const body = document.getElementById('ranking-body');
            body.innerHTML = sortedPlayers.slice(0, 5).map((p, i) => `
                <div class="rank-item animate-in" style="animation-delay: ${i * 0.1}s">
                    <div class="rank-info">
                        <span class="rank-number">${i + 1}</span>
                        <span style="font-weight:600; font-size:1.2rem;">${p.name}</span>
                    </div>
                    <span style="font-weight:800; color:var(--primary-light);">${p.score} pts</span>
                </div>
            `).join('');

            broadcast({
                type: 'ranking',
                ranking: sortedPlayers.map(p => ({name: p.name, score: p.score}))
            });
        }

        document.getElementById('continue-game-btn').onclick = () => {
            gameState.currentQuestion++;
            if (gameState.currentQuestion < quizData.length) {
                document.getElementById('ranking-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                showQuestion();
            } else {
                showPodium();
            }
        };

        function showPodium() {
            document.getElementById('ranking-screen').classList.add('hidden');
            document.getElementById('podium-screen').classList.remove('hidden');
            
            const sorted = Object.values(gameState.players)
                .sort((a, b) => b.score - a.score);
            
            const content = document.getElementById('podium-content');
            let podiumHtml = '';
            if (sorted[0]) podiumHtml += `<div class="mt-4"><h2>🥇 1º Lugar: ${sorted[0].name}</h2><p>${sorted[0].score} pontos</p></div>`;
            if (sorted[1]) podiumHtml += `<div class="mt-4"><h3>🥈 2º Lugar: ${sorted[1].name}</h3><p>${sorted[1].score} pontos</p></div>`;
            if (sorted[2]) podiumHtml += `<div class="mt-4"><h4>🥉 3º Lugar: ${sorted[2].name}</h4><p>${sorted[2].score} pontos</p></div>`;
            
            content.innerHTML = podiumHtml;
            broadcast({ type: 'game_over', winner: sorted[0]?.name });
        }

        initTrystero();
    </script>
</body>
</html>
